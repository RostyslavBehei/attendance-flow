databaseChangeLog:
  - changeSet:
      id: 001-create-verification-token-table
      author: RostyslavBehei
      changes:
        - createTable:
            schemaName: attendance
            tableName: verification_tokens
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: token
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: token_action
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: expiry_date
                  type: timestamp
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableSchemaName: attendance
            baseTableName: verification_tokens
            baseColumnNames: user_id
            referencedTableSchemaName: attendance
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_verification_tokens_user
            onDelete: CASCADE
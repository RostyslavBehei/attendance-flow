databaseChangeLog:
  - changeSet:
      id: 001-create-subjects-table
      author: RostyslavBehei
      changes:
        - createTable:
            schemaName: attendance
            tableName: subjects
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: text
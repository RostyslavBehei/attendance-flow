# App Setting
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

# Server port
server:
  port: ${SERVER_PORT:8080}

spring:
  mvc:
    problemdetails:
      enabled: true

  messages:
    basename: messages

  # LiquiBase Setting
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: PUBLIC
    liquibase-schema: PUBLIC

  # H2 Database
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: ${DB_H2_URL:jdbc:h2:file:./data/attendance_db}
    driver-class-name: ${DB_H2_DRIVER:org.h2.Driver}
    username: ${DB_H2_USERNAME:sa}
    password: ${DB_H2_PASSWORD:password}

  # JPA Configuration
  jpa:
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        default_schema: attendance
        format_sql: true
        use_sql_comments: true
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 20

  # Mail Setting
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:attendanceflowcorp@gmail.com}
    password: ${MAIL_PASSWORD:rpmeexazgxztvnro}
    properties:
      mail:
        SMTP:
          auth: true
          STARTTLS:
            enable: true
            required: true

  # Security Setting
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${SPRING_OAUTH2_CLIENT_ID}
            client-secret: ${SPRING_OAUTH2_CLIENT_SECRET}
            scope:
              - email
              - profile

  # Redis Setting
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  cache:
    redis:
      time-to-live: ${SPRING_REDIS_TTL:60}
      cache-null-values: false

# Logger Setting
logging:
  level:
    root: INFO
    com.attendance: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.telegram: INFO
    org.springframework.security: DEBUG
    liquibase: DEBUG

  file:
    name: logs/attendance-dev.log

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Telegram Bot Setting
telegram:
  bot:
    token: ${TG_BOT_TOKEN:7896329630:AAFtqvcZDGxUk_-L2fLAhv_d_G61QyaDMy0}
    username: ${TG_BOT_NAME}

# JWT Setting
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

# Actuator Setting
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: attendance-flow-app
